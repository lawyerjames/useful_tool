<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 閱讀器</title>
    <script type="module" crossorigin src="./assets/index-oax5B1Os.js"></script>
    <script type="module" crossorigin src="./assets/batch-search.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D1KKp_lX.css">
    <link rel="stylesheet" href="./assets/batch-search.css">
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar__group">
        <label class="btn btn--primary">
          載入 PDF
          <input id="file-input" type="file" accept="application/pdf" hidden />
        </label>
        <span id="file-name" class="file-name"></span>
      </div>

      <div class="toolbar__group nav-group" data-disabled>
        <button id="prev" class="btn" title="上一頁">‹</button>
        <span class="page-indicator">
          第
          <input id="page-input" class="page-input" type="number" min="1" value="1" />
          / <span id="page-count">0</span> 頁
        </span>
        <button id="next" class="btn" title="下一頁">›</button>
      </div>

      <div class="toolbar__group zoom-group" data-disabled>
        <button id="zoom-out" class="btn" title="縮小">−</button>
        <span id="zoom-level" class="zoom-level">100%</span>
        <button id="zoom-in" class="btn" title="放大">+</button>
        <select id="page-layout" class="page-layout-select" aria-label="PDF 預覽頁數">
          <option value="single" selected>單頁</option>
          <option value="spread">雙頁</option>
        </select>
      </div>
    </header>

    <main class="workspace">
      <section id="viewer" class="viewer">
        <div id="viewer-empty" class="viewer__empty">
          <p>把 PDF 拖放到這裡，或點左上角「載入 PDF」</p>
        </div>
        <canvas id="pdf-canvas" hidden></canvas>
        <div id="pdf-highlight-layer" class="pdf-highlight-layer" hidden aria-hidden="true"></div>
        <canvas id="pdf-canvas-secondary" hidden></canvas>
      </section>

      <div id="divider" class="divider" title="拖曳調整文字面板寬度"></div>

      <aside class="text-panel">
        <div class="text-panel__head">
          <div class="text-panel__row">
            <span id="status" class="status">尚未載入 PDF</span>
          </div>
          <div class="text-commandbar">
            <button id="ocr-btn" class="btn" disabled title="辨識目前頁面的文字">OCR</button>
            <button id="strip-btn" class="btn" disabled title="移除中文字之間多餘的空白">去空白</button>
            <button id="copy-btn" class="btn" disabled title="複製全部辨識文字">複製</button>
            <span class="commandbar-separator" aria-hidden="true"></span>
            <div class="font-size-ctrl" title="調整文字大小">
              <button id="font-dec" class="btn btn--icon" title="縮小文字">A−</button>
              <span id="font-size-label" class="font-size-label">15px</span>
              <button id="font-inc" class="btn btn--icon" title="放大文字">A＋</button>
            </div>
          </div>
        </div>
        <textarea
          id="text-output"
          class="text-output"
          readonly
          placeholder="此頁文字會顯示在這裡，可直接選取複製。"
        ></textarea>
      </aside>

      <div id="batch-divider" class="divider" title="拖曳調整辨識文字與批次索引的寬度"></div>

      <aside class="batch-panel">
        <div class="batch-panel__head">
          <div class="batch-panel__topline">
            <div class="batch-panel__title">文件檢索</div>
            <div id="batch-status" class="batch-status">索引保存在此瀏覽器。</div>
          </div>
          <div class="batch-commandbar" aria-label="批次索引操作">
            <button id="pick-folder-btn" class="btn btn--primary" title="選擇包含 PDF 的資料夾">資料夾</button>
            <label class="btn" title="選擇一份或多份 PDF">
              PDF
              <input id="batch-file-input" type="file" accept="application/pdf" multiple hidden />
            </label>
            <button id="pause-index-btn" class="btn" disabled>暫停</button>
            <button id="clear-index-btn" class="btn" title="清除所有本機索引">清除</button>
            <span class="commandbar-separator" aria-hidden="true"></span>
            <select id="ocr-mode" class="ocr-mode-select" aria-label="批次 OCR 辨識模式" title="選擇批次 OCR 的速度與精準度">
              <option value="quick">快速</option>
              <option value="balanced" selected>平衡</option>
              <option value="accurate">精準</option>
            </select>
            <button id="export-text-btn" class="btn" disabled title="匯出全部索引文字">匯文字</button>
            <button id="export-review-btn" class="btn" disabled title="匯出品質複核清單">匯複核</button>
          </div>
          <progress id="batch-progress" class="batch-progress" max="100" value="0" hidden></progress>
        </div>

        <div class="search-box">
          <input id="search-input" class="search-input" type="search" placeholder="搜尋；複合條件用 & 連接" title="例如：筆錄 & 雷迪宇（必須出現在同一頁）" />
          <select id="search-mode" class="search-mode-select" title="嚴格模式要求所有條件符合；防漏模式會列出少一個條件的疑似結果">
            <option value="strict">嚴格</option>
            <option value="recall">防漏</option>
          </select>
        </div>

        <div id="index-summary" class="index-summary"></div>
        <div class="batch-tabs" role="tablist" aria-label="檢索內容">
          <button class="batch-tab is-active" type="button" role="tab" aria-selected="true" data-batch-tab="search">搜尋結果</button>
          <button class="batch-tab" type="button" role="tab" aria-selected="false" data-batch-tab="audit">
            品質稽核 <span id="audit-count" class="audit-count">0</span>
          </button>
          <button class="batch-tab" type="button" role="tab" aria-selected="false" data-batch-tab="files">索引檔案</button>
        </div>

        <section class="batch-tab-panel is-active" data-batch-panel="search">
          <div id="search-results" class="search-results"></div>
        </section>

        <section id="quality-audit" class="batch-tab-panel quality-audit" data-batch-panel="audit" hidden>
          <div class="audit-controls">
            <select id="audit-filter" class="audit-filter" aria-label="品質稽核分類">
              <option value="all">全部稽核頁面</option>
              <option value="low-confidence">低信心</option>
              <option value="unrecognized">無法辨識</option>
              <option value="suspicious">可疑文字層</option>
              <option value="refined">已精細重辨</option>
            </select>
          </div>
          <div id="audit-list" class="audit-list" aria-live="polite"></div>
        </section>

        <section class="batch-tab-panel" data-batch-panel="files" hidden>
          <div id="index-files" class="index-files" aria-live="polite"></div>
        </section>
      </aside>
    </main>
  </body>
</html>
